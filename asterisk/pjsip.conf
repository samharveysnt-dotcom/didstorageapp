; DIDStorage Asterisk PJSIP config
;
; @PUBLIC_IP@ is substituted at deploy time.

[global]
type=global
endpoint_identifier_order=ip,username,anonymous

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=@PUBLIC_IP@
external_signaling_address=@PUBLIC_IP@

; Some carriers (didcomms among them) send INVITEs over TCP. PJSIP needs a
; separate transport definition per protocol; without this the TCP SYN gets
; "connection refused" and the call attempt never reaches our dialplan.
; Identify blocks match by source IP regardless of transport, so the same
; supplier-N-id blocks in pjsip_suppliers.conf cover both.
[transport-tcp]
type=transport
protocol=tcp
bind=0.0.0.0:5060
external_media_address=@PUBLIC_IP@
external_signaling_address=@PUBLIC_IP@

;-----------------------------------------------------------------
; Inbound trunks (suppliers)
;-----------------------------------------------------------------
; ONE shared endpoint for every supplier. Per-supplier identify blocks
; live in pjsip_suppliers.conf (auto-generated by didapi from
; supplier_ip_groups + supplier_ip_group_members on every IP add /
; edit / delete, followed by `asterisk -rx "pjsip reload"`). Adding
; a supplier IP in /suppliers/{id}#ips therefore Just Works — no
; manual pjsip edit required.
;
; No AOR is configured: this endpoint is inbound-only; we don't qualify
; suppliers and we don't originate to them outside an existing dialog
; (in-dialog requests use the Contact header from the INVITE, not the
; AOR). Asterisk's `pjsip show endpoint supplier-trunk` will report
; "Unavailable" — that's cosmetic, not a fault.
[supplier-trunk]
type=endpoint
context=from-supplier
disallow=all
allow=ulaw
allow=alaw
allow=g722
direct_media=no
trust_id_inbound=yes
language=en

#include pjsip_suppliers.conf

;-----------------------------------------------------------------
; Outbound trunk (used to dial arbitrary URIs out to user routes)
;-----------------------------------------------------------------
[outbound]
type=endpoint
context=outbound-stub
disallow=all
allow=ulaw
allow=alaw
allow=g722
direct_media=no
allow_subscribe=no

;-----------------------------------------------------------------
; In-system SIP accounts (didapi-generated)
;-----------------------------------------------------------------
; didapi writes /etc/asterisk/pjsip_users.conf whenever a sip_account
; is created/updated/deleted, then runs `asterisk -rx "pjsip reload"`.
; Each account becomes endpoint `user-<username>` plus matching auth + AOR.
#include pjsip_users.conf

