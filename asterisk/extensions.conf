; DIDStorage Asterisk dialplan
;
; Inbound supplier traffic lands in [from-supplier]. We call our Python AGI
; helper to ask didapi /sipctl/authorize whether this DID is allowed and where
; to route it. On allow we Dial() to the returned target with L() enforcing
; the max balance-driven duration. The h-extension (hangup handler) POSTs the
; CDR to /sipctl/cdr regardless of how the call ended.

[globals]

[general]

;-----------------------------------------------------------------
[from-supplier]
;-----------------------------------------------------------------
exten => _X.,1,NoOp(Inbound: ${CALLERID(num)} -> ${EXTEN} from ${CHANNEL(pjsip,remote_addr)})
 same => n,Set(SRC_IP=${CUT(CHANNEL(pjsip,remote_addr),:,1)})
 same => n,Set(CALL_ID=${CHANNEL(pjsip,call-id)})
 same => n,Set(CDR(userfield)=${CALL_ID})
 ; Push a hangup handler — fires reliably regardless of how the channel
 ; exits the dialplan (Spawn-non-zero, timer expiry, peer hangup, error).
 ; The "h" extension is unreliable in some of those cases.
 same => n,Set(CHANNEL(hangup_handler_push)=hangup-handler,s,1)
 same => n,AGI(/opt/didstorage/scripts/dids-authorize.py,${CALL_ID},${SRC_IP},sip:${EXTEN}@${CHANNEL(pjsip,local_addr)},${CALLERID(all)},${CHANNEL})
 same => n,NoOp(authz: decision=${AUTH_DECISION} reason=${AUTH_REASON} kind=${AUTH_ROUTE_KIND} target=${AUTH_ROUTE_TARGET} max=${AUTH_MAX_SECONDS})

 same => n,GotoIf($["${AUTH_DECISION}"="allow"]?dial:reject)

 ; Reject path: use the Q.850 cause /sipctl/authorize sent back so the SIP
 ; response code matches the actual denial reason (1→404 for unknown DID,
 ; 31→480 for kyc_pending/quarantined, 17→486 Busy for channel-cap, etc.).
 ; Falls back to 21 (→403 Forbidden) when the AGI didn't supply a cause —
 ; e.g. if /sipctl is unreachable and AUTH_DECISION=error.
 same => n(reject),NoOp(authorize denied: ${AUTH_REASON} cause=${AUTH_HANGUP_CAUSE})
 same => n,Hangup(${IF($[${AUTH_HANGUP_CAUSE} > 0]?${AUTH_HANGUP_CAUSE}:21)})

 ; route_kind dispatch
 same => n(dial),GotoIf($["${AUTH_ROUTE_KIND}"="sip_uri"]?dial-uri)
 same => n,GotoIf($["${AUTH_ROUTE_KIND}"="ip"]?dial-ip)
 same => n,GotoIf($["${AUTH_ROUTE_KIND}"="sip_account"]?dial-acct)
 same => n,GotoIf($["${AUTH_ROUTE_KIND}"="audio"]?dial-audio)
 same => n,Hangup(31)

 ; sip_uri: dial the returned URI verbatim through the outbound trunk endpoint.
 ; PJSIP dial-string is "PJSIP/<endpoint>/<uri>" — endpoint first.
 ; Dial() L() takes ms — convert seconds to ms.
 same => n(dial-uri),Set(DIAL_MS=$[${AUTH_MAX_SECONDS}*1000])
 same => n,Dial(PJSIP/outbound/${AUTH_ROUTE_TARGET},${AUTH_MAX_SECONDS},L(${DIAL_MS}:60000:30000))
 same => n,Hangup()

 ; ip: keep the DID number as the called user, force next-hop to the IP.
 same => n(dial-ip),Set(DIAL_MS=$[${AUTH_MAX_SECONDS}*1000])
 same => n,Dial(PJSIP/outbound/sip:${EXTEN}@${AUTH_ROUTE_TARGET},${AUTH_MAX_SECONDS},L(${DIAL_MS}:60000:30000))
 same => n,Hangup()

 ; sip_account: route to a registered SIP account inside our system. Endpoints
 ; are auto-generated by didapi (endpoint name = the SIP username so PJSIP's
 ; "username" identifier matches REGISTERs to the right auth/realm). If the
 ; user isn't registered to any contact, Dial() returns CHANUNAVAIL and we
 ; hang up with cause 31.
 ;
 ; Adaptive jitter buffer on the calling leg paces softphone audio to a steady
 ; cadence before forwarding to the supplier. Necessary because most softphones
 ; do VAD/silence-suppression (no RTP during silence) which the far-end carrier
 ; doesn't tolerate well. Adds ~60ms of one-way latency, way better than the
 ; multi-second drift it prevents.
 same => n(dial-acct),Set(DIAL_MS=$[${AUTH_MAX_SECONDS}*1000])
 same => n,Set(JITTERBUFFER(adaptive)=default)
 same => n,Dial(PJSIP/${AUTH_ROUTE_TARGET},${AUTH_MAX_SECONDS},L(${DIAL_MS}:60000:30000))
 same => n,Hangup()

 ; audio: answer the call, play the admin-uploaded clip once, hang up. Used
 ; for reserved DIDs whose reservation points at an audio_files row. The
 ; AUTH_ROUTE_TARGET is the Asterisk-relative basename, e.g.
 ; "didstorage/af_abc12345" — files are stored under
 ; /var/lib/asterisk/sounds/didstorage/<basename>.slin and Playback() resolves
 ; the right codec file at runtime.
 ;
 ; Wait(1) gives the inbound carrier a beat to complete RTP setup before we
 ; start writing audio; some carriers drop the first half-second otherwise.
 ; Hangup defaults to cause 16 (Normal Clearing) which most carriers turn into
 ; an ordinary "call ended" signal — exactly what we want for an end-of-message
 ; teardown.
 same => n(dial-audio),NoOp(playback clip=${AUTH_ROUTE_TARGET} cap=${AUTH_MAX_SECONDS}s)
 ; Runaway guard: hard-cap the channel at AUTH_MAX_SECONDS regardless of
 ; how long the clip is. Without this a missing / looping / oversized
 ; audio file can hold the channel open indefinitely, which inflates
 ; concurrency counters and shows as a stuck row on /live even though
 ; teardown is otherwise working. TIMEOUT(absolute) fires the T
 ; extension on expiry; Hangup on the next line runs after Playback
 ; returns normally. Fallback to 300 (5 min) if the AGI didn't set the
 ; variable — matches sipctl's reserved-audio ceiling.
 same => n,Set(TIMEOUT(absolute)=${IF($["${AUTH_MAX_SECONDS}"!=""&$[${AUTH_MAX_SECONDS}>0]]?${AUTH_MAX_SECONDS}:300)})
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(${AUTH_ROUTE_TARGET})
 same => n,Hangup()
 ; T extension fires when TIMEOUT(absolute) hits before Playback returns.
 ; Push-handler will still fire and clear the live-calls row.
 exten => T,1,NoOp(reserved-audio TIMEOUT hit cap=${AUTH_MAX_SECONDS}s)
  same => n,Hangup(16)

;-----------------------------------------------------------------
[from-account]
;-----------------------------------------------------------------
; Calls FROM a registered SIP account into our system. v1: no outbound from
; users (the platform is inbound-only by design). REGISTER works for
; receiving calls; outbound dialing is rejected.
exten => _.,1,NoOp(SIP account outbound attempt — rejected, inbound-only)
 same => n,Hangup(31)

; Legacy h-extension kept as a backup in case anything bypasses the push handler.
exten => h,1,NoOp(h-fallback: ${CDR(userfield)} bill=${CDR(billsec)} cause=${HANGUPCAUSE})
 same => n,AGI(/opt/didstorage/scripts/dids-cdr.py,${CDR(userfield)},${CDR(start)},${CDR(answer)},${CDR(end)},${CDR(billsec)},${HANGUPCAUSE},${CDR(src)},${CDR(dst)})

;-----------------------------------------------------------------
[hangup-handler]
;-----------------------------------------------------------------
; Reliable hangup handler pushed onto every inbound channel via
; Set(CHANNEL(hangup_handler_push)=hangup-handler,s,1). Fires once per call
; regardless of dialplan exit reason. Idempotent on /sipctl/cdr (call_id
; is the unique key).
exten => s,1,NoOp(hangup-handler call_id=${CDR(userfield)} dur=${CDR(duration)} bill=${CDR(billsec)} cause=${HANGUPCAUSE} dst=${CDR(dst)} src=${CDR(src)})
 same => n,AGI(/opt/didstorage/scripts/dids-cdr.py,${CDR(userfield)},${CDR(start)},${CDR(answer)},${CDR(end)},${CDR(billsec)},${HANGUPCAUSE},${CDR(src)},${CDR(dst)})
 same => n,Return()

;-----------------------------------------------------------------
[outbound-stub]
;-----------------------------------------------------------------
; Calls reaching here are unexpected — we should never receive INVITEs from
; the outbound trunk endpoint.
exten => _.,1,NoOp(Unexpected inbound on outbound trunk)
 same => n,Hangup(31)

;-----------------------------------------------------------------
[admin-actions]
;-----------------------------------------------------------------
; Live-call control surface for the admin GUI's /live page. didapi sets a
; channel variable (ADMIN_PROMPT or ADMIN_REDIRECT) via
;   asterisk -rx "dialplan set chanvar <chan> <VAR> <value>"
; then transfers the channel here with
;   asterisk -rx "channel transfer <chan> <ext>@admin-actions"
; The original outbound leg of the bridge is dropped; this dialplan runs on
; the inbound (supplier-side) leg only.

; ----------------------------------------------------------------------
; redirect — Dial a new destination and bridge to the caller.
;
; ADMIN_REDIRECT must be a full Dial() string. didapi composes it from
; route_kind + route_target per the same conventions as /sipctl/authorize:
;   sip_uri      PJSIP/outbound/sip:904@example.com
;   ip           PJSIP/outbound/sip:<E164>@1.2.3.4:5060
;   sip_account  PJSIP/<endpoint-username>
;
; Hard cap of 1h on the redirected leg to prevent runaway calls. The L()
; option re-uses the same warn/expiry semantics as the main /from-supplier
; flow so admins can't accidentally run a call past balance limits.
; ----------------------------------------------------------------------
exten => redirect,1,NoOp(admin-actions redirect ${CHANNEL} -> ${ADMIN_REDIRECT})
 same => n,GotoIf($["${ADMIN_REDIRECT}"=""]?bad)
 same => n,Dial(${ADMIN_REDIRECT},60,L(3600000:60000:30000))
 same => n,Hangup()
 same => n(bad),NoOp(admin redirect: empty target)
 same => n,Hangup(31)

; ----------------------------------------------------------------------
; play-audio — redirect target for the /live audio-redirect button.
;
; ADMIN_AUDIO_TARGET is an Asterisk Playback() basename in the format
; "didstorage/<af_basename>" (no extension). didapi composes it from a
; chosen audio_files row (for route_kind=audio) or a per-call random pick
; from an audio_group's members (for route_kind=audio_group). Either way
; we just answer, play the clip once, and hang up with cause 16 (Normal
; Clearing) — same path the from-supplier dial-audio branch takes for
; reservations, just reached via channel-transfer instead of dispatch
; on AUTH_ROUTE_KIND.
;
; The Wait(1) gives the inbound carrier a beat to swallow our 200 OK on
; the original call and accept the channel-transfer state change before
; we start writing RTP. Without it some carriers (Sangoma in particular)
; drop the first ~500ms of audio.
; ----------------------------------------------------------------------
exten => play-audio,1,NoOp(admin-actions play-audio ${CHANNEL} -> ${ADMIN_AUDIO_TARGET})
 same => n,GotoIf($["${ADMIN_AUDIO_TARGET}"=""]?bad)
 same => n,Answer()
 same => n,Wait(1)
 same => n,Playback(${ADMIN_AUDIO_TARGET})
 same => n,Hangup(16)
 same => n(bad),NoOp(admin play-audio: empty target)
 same => n,Hangup(31)

