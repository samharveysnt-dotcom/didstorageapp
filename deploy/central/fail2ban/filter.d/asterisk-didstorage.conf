# Match Asterisk PJSIP log lines indicating a failed/anonymous request:
#   Request 'REGISTER' from '<sip:100@45.8.93.244>' failed for '185.243.5.46:56147' (callid: ...) - No matching endpoint found
#   Request 'REGISTER' from '<sip:100@45.8.93.244>' failed for '185.243.5.46:56147' (callid: ...) - Failed to authenticate
[INCLUDES]
before = common.conf

[Definition]
failregex = failed for '<HOST>:\d+'.*(No matching endpoint|Failed to authenticate)
ignoreregex =
