#!KAMAILIO
#
# DIDStorage central node — Kamailio 5.8 config.
#
# Acts as a B2BUA-ish SIP proxy + dialog tracker. On every initial INVITE we
# call out to didapi (/sipctl/authorize) which makes the routing decision, then
# we relay using the response and arm a dialog timer for the hard balance
# cutoff. On BYE/timeout we POST CDR to /sipctl/cdr.
#
# Substitutions performed by deploy/02-deploy-app.sh:
#   @PUBLIC_IP@      -> public IP of this node
#   @AUTH_TOKEN@     -> shared secret for X-DIDS-Auth
#   @DIDAPI_URL@     -> http://127.0.0.1:8080
#   @RTPENGINE_NS@   -> rtpengine ng socket, e.g. udp:127.0.0.1:2223

####### Defines #########
#!define DIDAPI_URL    "@DIDAPI_URL@"
#!define AUTH_TOKEN    "@AUTH_TOKEN@"
#!define PUBLIC_IP     "@PUBLIC_IP@"
#!define RTPENGINE_NS  "@RTPENGINE_NS@"

####### Global Parameters #########
debug=2
log_stderror=no
memdbg=5
memlog=5
log_facility=LOG_LOCAL0
log_prefix="{$mt $hdr(CSeq) $ci} "

children=4
fork=yes

/* Listen on the public IP so Via and Record-Route headers carry the right
   address. Listening on 0.0.0.0 makes Kamailio stamp Via with 0.0.0.0 too,
   which breaks transaction matching when downstream replies come back. */
listen=udp:PUBLIC_IP:5060 advertise PUBLIC_IP:5060
listen=tcp:PUBLIC_IP:5060 advertise PUBLIC_IP:5060

####### Modules Section ########
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "kex.so"
loadmodule "siputils.so"
loadmodule "textops.so"
loadmodule "maxfwd.so"
loadmodule "dialog.so"
loadmodule "rtpengine.so"
loadmodule "http_client.so"
loadmodule "json.so"

# Module params
modparam("tm", "fr_timer", 30000)
modparam("tm", "fr_inv_timer", 120000)

modparam("rr", "enable_full_lr", 1)
modparam("rr", "append_fromtag", 0)

modparam("dialog", "dlg_flag", 4)
modparam("dialog", "default_timeout", 14400)
modparam("dialog", "track_cseq_updates", 1)
modparam("dialog", "send_bye", 1)

modparam("rtpengine", "rtpengine_sock", RTPENGINE_NS)

modparam("http_client", "connection_timeout", 2)

####### Routing Logic ########

request_route {
    # Sanity / basic protection
    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }
    if (!sanity_check("17895")) {
        xlog("L_WARN", "sanity check failed from $si\n");
        exit;
    }

    # Replies with empty To-tag are acks of our own — let them through TM
    if (has_totag()) {
        loose_route();
        if (is_method("BYE")) {
            xlog("L_INFO", "BYE in dialog, will fire CDR\n");
            setflag(2);  # mark for CDR posting in onreply or branch
        }
        t_relay();
        exit;
    }

    if (is_method("CANCEL")) {
        if (t_check_trans()) { t_relay(); }
        exit;
    }

    if (is_method("OPTIONS") && uri==myself) {
        sl_send_reply("200", "Keepalive");
        exit;
    }

    if (is_method("REGISTER")) {
        # v1: no in-system SIP registration handling on central.
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    if (!is_method("INVITE")) {
        sl_send_reply("405", "Method Not Allowed");
        exit;
    }

    # Initial INVITE — log source then go authorize
    xlog("L_INFO", "INVITE from $si:$sp to $tu (Call-ID $ci)\n");
    route(AUTHORIZE);
}

# Synchronous /sipctl/authorize call.
# v1 uses http_client (sync). Production should switch to http_async_client.
route[AUTHORIZE] {
    $var(body) = "{"
        + "\"call_id\":\"" + $ci + "\","
        + "\"src_ip\":\"" + $si + "\","
        + "\"to_uri\":\"" + $tu + "\","
        + "\"from_uri\":\"" + $fu + "\""
        + "}";

    $var(hdrs) = "Content-Type: application/json\r\nX-DIDS-Auth: " + AUTH_TOKEN;
    http_client_query(DIDAPI_URL "/sipctl/authorize", "$var(body)", "$var(hdrs)", "$var(rep)");
    if ($rc != 200) {
        xlog("L_WARN", "authorize HTTP $rc, denying\n");
        sl_send_reply("503", "Authorization Service Unavailable");
        exit;
    }
    xlog("L_INFO", "authorize body: $var(rep)\n");

    # Pull fields out of the response with subst transformations. The regex
    # matches the whole body and replaces it with just the captured group, so
    # $var(field) ends up holding only the value. We control both ends so a
    # fixed JSON shape is fine.
    $var(decision) = $(var(rep){re.subst,/^.*"decision":"([^"]*)".*$/\1/});
    if ($var(decision) != "allow") {
        xlog("L_INFO", "authorize denied: $var(rep)\n");
        sl_send_reply("403", "Forbidden");
        exit;
    }
    $var(rkind)   = $(var(rep){re.subst,/^.*"route_kind":"([^"]*)".*$/\1/});
    $var(rtarget) = $(var(rep){re.subst,/^.*"route_target":"([^"]*)".*$/\1/});
    $var(maxsec)  = $(var(rep){re.subst,/^.*"max_seconds":([0-9]+).*$/\1/});

    # Build outbound R-URI per route kind.
    if ($var(rkind) == "ip") {
        $du = "sip:" + $var(rtarget);
    } else if ($var(rkind) == "sip_uri") {
        $ru = $var(rtarget);
    } else if ($var(rkind) == "sip_account") {
        sl_send_reply("503", "SIP Account Routing Not Yet Implemented");
        exit;
    } else {
        sl_send_reply("500", "Bad Route Kind");
        exit;
    }
    xlog("L_INFO", "relaying $rm to ru=$ru du=$du\n");

    # MINIMAL relay: confirm basic signalling first. Re-add dialog tracking,
    # rtpengine, and failure handler after we see end-to-end works.
    record_route();
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

# Dialog termination -> POST CDR.
# Hooked via event_route[dialog:end] in 5.8.
event_route[dialog:end] {
    xlog("L_INFO", "dialog:end ci=$ci billsec=$dlg_var(billsec)\n");
    route(POST_CDR);
}

route[POST_CDR] {
    $var(started) = $TS;          # transaction start time (best effort)
    $var(ended)   = $TS;
    $var(billsec) = $dlg_var(billsec);
    if ($var(billsec) == "" || $var(billsec) == "<null>") {
        $var(billsec) = "0";
    }

    $var(cdr) = "{"
        + "\"call_id\":\"" + $ci + "\","
        + "\"reservation_id\":\"" + $ci + "\","
        + "\"started_at\":" + $var(started) + ","
        + "\"answered_at\":0,"
        + "\"ended_at\":" + $var(ended) + ","
        + "\"billsec\":" + $var(billsec) + ","
        + "\"hangup_cause\":\"normal\","
        + "\"src_uri\":\"" + $fu + "\","
        + "\"dst_uri\":\"" + $tu + "\""
        + "}";

    $var(cdrhdrs) = "Content-Type: application/json\r\nX-DIDS-Auth: " + AUTH_TOKEN;
    http_client_query(DIDAPI_URL "/sipctl/cdr", "$var(cdr)", "$var(cdrhdrs)", "$var(cdrrep)");
    if ($rc != 200) {
        xlog("L_WARN", "CDR post failed: $rc\n");
    }
}

reply_route {
    sanity_check("17604");

    if (status =~ "^(180|183|200)") {
        rtpengine_manage();
    }
}

onreply_route {
    if (status =~ "^(180|183|200)") {
        rtpengine_manage();
    }
}

# Failure: tear down RTPengine session, exit gracefully
failure_route {
    if (t_is_canceled()) {
        rtpengine_delete();
        exit;
    }
}
